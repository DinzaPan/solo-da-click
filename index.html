<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para My love</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
  }

  body {
    font-family: 'Fredoka', sans-serif;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #ffffff;
    overflow: hidden;
  }

  .content-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
  }

  h1 { color: #ff4757; font-size: 2.2rem; margin-bottom: 10px; }
  .subtitle { color: #ff6b81; font-size: 1.2rem; margin-bottom: 30px; }

  .option-btn {
    padding: 12px 35px;
    font-size: 1.2rem;
    font-weight: 600;
    color: white;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    background-color: #ff4757;
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px auto;
  }

  #message-container {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    animation: fadeIn 0.8s ease;
  }

  .bubble {
    position: relative;
    background: #ffffff;
    border: 1px solid #000000;
    border-radius: 20px;
    padding: 15px 20px;
    margin-bottom: 20px;
    max-width: 85%;
    color: #ff4757;
    font-weight: 600;
    font-size: 1.1rem;
    line-height: 1.4;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bubble::after {
    content: '';
    position: absolute;
    bottom: -11px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 10px 10px 0;
    border-style: solid;
    border-color: #000000 transparent;
  }

  .bubble::before {
    content: '';
    position: absolute;
    bottom: -9px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 10px 10px 0;
    border-style: solid;
    border-color: #ffffff transparent;
    z-index: 1;
  }

  .cat-img {
    width: 280px;
    height: auto;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .button-group {
    display: none;
    gap: 15px;
    margin-top: 15px;
  }

  #final-text {
    display: none;
    color: #ff4757;
    font-size: 4rem;
    font-weight: 700;
    animation: fadeIn 1s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<div class="content-wrapper">
  <div id="start-screen">
    <h1>¿Quieres Comenzar?</h1>
    <p class="subtitle">Felices 4 Meses de relación</p>
    <button id="btn-play" class="option-btn">Play</button>
  </div>

  <div id="message-container">
    <div class="bubble" id="dialogue-text">Hola de Nuevo creo que ya es costumbre ver a alguien tan hermosa por aqui</div>
    <img src="img/gato3.jpeg" alt="Gato" class="cat-img" id="cat-main">
    <div class="button-group" id="btn-choice-group">
      <button class="option-btn" id="btn-yes">Sí</button>
      <button class="option-btn" id="btn-no">No</button>
    </div>
  </div>

  <div id="final-text">Fin ❤️</div>
</div>

<script>
  const btnPlay = document.getElementById('btn-play');
  const startScreen = document.getElementById('start-screen');
  const messageContainer = document.getElementById('message-container');
  const catMain = document.getElementById('cat-main');
  const dialogueText = document.getElementById('dialogue-text');
  const btnGroup = document.getElementById('btn-choice-group');
  const btnYes = document.getElementById('btn-yes');
  const btnNo = document.getElementById('btn-no');
  const finalText = document.getElementById('final-text');

  let currentState = 0;
  let audio = new Audio('music/mylove.mp3');
  let syncInterval = null;

  const lyrics = [
    { start: 9.60, text: "Tus besos se llegaron a recrear aquí en" },
    { start: 14.64, text: "mi boca" },
    { start: 18.80, text: "llenando de ilusión y de pasión" },
    { start: 23.08, text: "mi vida loca" },
    { start: 28.04, text: "las horas más felices" },
    { start: 30.28, text: "de mi amor fueron con tigo" },
    { start: 37.36, text: "por eso es que mi alma siempre extrañe" },
    { start: 41.44, text: "el dulce alivio" },
    { start: 46.48, text: "te puedo yo jurar ante un altar" },
    { start: 50.44, text: "Mi amor sincero" },
    { start: 55.72, text: "a todo el mundo le puedes contar que..." },
    { start: 60.28, text: "Si te quiero" },
    { start: 64.64, text: "tus labios me ensañaron a sentir lo que" },
    { start: 69.32, text: "es ternura" },
    { start: 73.92, text: "y no me cansaré de bendecir tanta" },
    { start: 78.84, text: "dulzura" }
  ];

  const story = [
    { img: "img/gato3.jpeg", text: "Hola de Nuevo creo que ya es costumbre ver a alguien tan hermosa por aqui", type: "click" },
    { img: "img/gato7.jpeg", text: "Emm...Te preguntaras para que te hice esta página verdad?", type: "choice" },
    { img: "img/gato13.jpeg", text: "Que no es obvio para deciarte un felices 4 meses de relación mi niña hermosa", type: "click" },
    { img: "img/gato11.jpeg", text: "Te gusto la página, esto es todo jeje....", type: "click" },
    { img: "img/gato14.jpeg", text: "No me crees que esto es todo??", type: "choice2" },
    { img: "img/gato15.jpeg", text: "Bueno no te equivocas...", type: "click" },
    { img: "img/gato16.jpeg", text: "Tu crees que tu amado que se paso asiendo esta página únicamente para ti aria solo eso", type: "click" },
    { img: "img/gato17.jpeg", text: "Pues claro que no, sabes algo mvd...", type: "click" },
    { img: "img/gato18.jpeg", text: "Aveces quisiera tener mas dinero para darte todo lo que quieras y llenarte de regalos", type: "click" },
    { img: "img/gato19.jpeg", text: "Aveces quisiera tener dinero infinito no porque diga que seas alguien que le guste el dinero, si no porque no sabes como me gusta verte sonreír cuando te doy algo", type: "click" },
    { img: "img/gato20.jpeg", text: "Pero nimodo dios me hizo pobre y color humildad extrema 😭", type: "click" },
    { img: "img/gato14.jpeg", text: "Sabes...", type: "click" },
    { img: "img/gato15.jpeg", text: "Me gustaría algun dia cantarte esta canción...", type: "click" },
    { img: "img/gato21.jpeg", text: "...", type: "music" },
    { img: "img/gato15.jpeg", text: "Entonces...Amor me prometes estar con migo asta el final y ser tu mejor version de ti y yo dar mi mejor versión para ti?", type: "choiceEnd" },
    { img: "img/gato10.jpeg", text: "Enserió!!!!! Te prometo que intentare siempre estar a tu lado mvd y mandar a la vrg a las demas que seme aserquen", type: "click" },
    { img: "img/gato6.jpeg", text: "Enverdad no sabes cuanto te amo mvd, espero siempre poder seguir amandote y un dia estar a tu lado sin tanta distancia❤️", type: "click" },
    { img: "img/gato3.jpeg", text: "Mientras cuidate bien mvd y espero volver a clases para verte otra vez, Te amo mucho mi niña hermosa", type: "click" },
    { type: "theEnd" }
  ];

  function updateDisplay() {
    if (currentState >= story.length) return;
    
    const step = story[currentState];

    if (step.type === "theEnd") {
      messageContainer.style.display = "none";
      finalText.style.display = "block";
      return;
    }

    catMain.src = step.img;
    dialogueText.innerText = step.text;

    if (step.type === "choice" || step.type === "choice2" || step.type === "choiceEnd") {
      btnGroup.style.display = "flex";
      catMain.style.pointerEvents = "none";
    } else {
      btnGroup.style.display = "none";
      catMain.style.pointerEvents = (step.type === "music") ? "none" : "auto";
    }

    if (step.type === "music") {
      startMusicLogic();
    }
  }

  function startMusicLogic() {
    audio.currentTime = 0;
    audio.volume = 1;
    audio.play();
    
    syncInterval = setInterval(() => {
      const time = audio.currentTime;
      const currentLyric = lyrics.filter(l => time >= l.start).pop();
      
      if (currentLyric) {
        dialogueText.innerText = currentLyric.text;
        
        if (currentLyric.text === "dulzura") {
          clearInterval(syncInterval);
          setTimeout(() => {
            fadeAndNext();
          }, 3000);
        }
      }
    }, 100);
  }

  function fadeAndNext() {
    let fade = setInterval(() => {
      if (audio.volume > 0.1) {
        audio.volume -= 0.1;
      } else {
        audio.pause();
        clearInterval(fade);
        currentState++;
        updateDisplay();
      }
    }, 200);
  }

  btnPlay.addEventListener('click', () => {
    startScreen.style.display = 'none';
    messageContainer.style.display = 'flex';
  });

  catMain.addEventListener('click', () => {
    if (currentState < story.length - 1) {
      currentState++;
      updateDisplay();
    }
  });

  btnYes.addEventListener('click', () => {
    if (story[currentState].type === "choice" || story[currentState].type === "choiceEnd") {
      currentState++;
      updateDisplay();
    } else if (story[currentState].type === "choice2") {
      location.reload();
    }
  });

  btnNo.addEventListener('click', () => {
    if (story[currentState].type === "choice" || story[currentState].type === "choiceEnd") {
      location.reload();
    } else if (story[currentState].type === "choice2") {
      currentState++;
      updateDisplay();
    }
  });
</script>
</body>
</html>
